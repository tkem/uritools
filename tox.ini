[tox]
envlist = check-manifest,docs,doctest,format,lint,py,pyright

[testenv]
deps =
    pytest
    pytest-cov
commands =
    py.test --basetemp={envtmpdir} --cov=uritools --cov-report term-missing {posargs}

[testenv:check-manifest]
deps =
    check-manifest
commands =
    check-manifest
skip_install = true

[testenv:docs]
deps =
     sphinx
commands =
     sphinx-build -W -b html -d {envtmpdir}/doctrees docs {envtmpdir}/html

[testenv:doctest]
deps =
     sphinx
commands =
     sphinx-build -W -b doctest -d {envtmpdir}/doctrees docs {envtmpdir}/doctest

[testenv:format]
deps =
    ruff
commands =
    ruff format --diff -q {posargs}
skip_install = true

[testenv:lint]
deps =
    ruff
commands =
    ruff check {posargs}
skip_install = true

[testenv:pyright]
deps =
    pyright
commands =
    pyright {posargs}
skip_install = true
